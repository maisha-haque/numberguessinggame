<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class-29</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>NUMBER <br>
     GUESSING GAME
    </h1>

    <!-- ----- -->

    <div class="boxonebg">
        <div class="boxone">
            <h2 class="boxtextone">Wanna Play A Game? <br> Enter Your Name</h2>
            <input type="text" placeholder="Enter Your Name" class="boxoneinput">
            <button class="btnone">Start Game</button>
            <h3 class="boxtextonee" hidden>Name Is Missing!</h3>


        </div>

    </div>

    <!-- ----- -->

     <div class="playone">

        <div class="playeronebg">

          <div class="playerone">
             <h2 class="playertextone">Player-1</h2>
             <input type="text" placeholder="Enter a Number" class="playeroneinput">
             <button class="pbtnone">Let's Go</button>
             <h3 class="playertextonee">Must Enter A Number!</h3>
            </div>

        </div>

     </div>


    <!-- ----- -->

     <div class="btwo">

        <div class="boxtwobg">

          <div class="boxtwo">
             <h2 class="boxtexttwo">Player-2 <br>Enter Your Name</h2>
             <input type="text" placeholder="Enter Your Name" class="boxtwoinput">
             <button class="btntwo">Start Game</button>
             <h3 class="boxtexttwoo">Name Is Missing!</h3>
            </div>

        </div>

     </div>


    <!-- ----- -->

        <div class="playtwo">

        <div class="playertwobg">

          <div class="playertwo">
             <h2 class="playertexttwo">Player-2</h2>
             <input type="text" placeholder="Guess The Number" class="playertwoinput">
             <button class="pbtntwo">Guess</button>
             <h3 class="playertexttwoo">Must Enter A Number!</h3>
            </div>

        </div>

      </div>
   <!-- ------------------------- -->

         <div class="bthree">

        <div class="boxthreebg">

          <div class="boxthree">
             <h2 class="boxtextthree">Player-3 <br>Enter Your Name</h2>
             <input type="text" placeholder="Enter Your Name" class="boxthreeinput">
             <button class="btnthree">Start Game</button>
             <h3 class="boxtextthreee">Name Is Missing!</h3>
            </div>

        </div>

     </div>


    <!-- ----- -->

      <div class="playthree">

        <div class="playerthreebg">

          <div class="playerthree">
             <h2 class="playertextthree">Player-3</h2>
             <input type="text" placeholder="Guess The Number" class="playerthreeinput">
             <button class="pbtnthree">Guess</button>
             <h3 class="playertextthreee">Must Enter A Number!</h3>
            </div>

        </div>

      </div>

    <!-- ---------------- -->

      <div class="over">

        <div class="overbg">

          <div class="gameover">
             <h2 class="gotext">Game Over</h2>
             <button class="replaybtn">Re-Play</button>
            </div>

        </div>

      </div>


</body>
</html>
