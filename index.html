<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>class-29</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>NUMBER <br>
     GUESSING GAME
    </h1>

    <!-- ----- -->

    <div class="boxonebg" id="firstscreen">
        <div class="boxone">
            <h2 class="boxtextone">Wanna Play A Game? <br> Enter Your Name</h2>
            <input type="text" placeholder="Enter Your Name" class="boxoneinput" id="nameinputone">
            <button class="btnone" id="startbtn">Start Game</button>
            <h3 class="boxtextonee" id="nameerrorone" hidden>Name Is Missing!</h3>


        </div>

    </div>

    <!-- ----- -->


        <div class="playeronebg" id="playeronescreen">

          <div class="playerone">
             <h2 class="playertextone" id="playernameone">Player-1</h2>
             <input type="number" placeholder="Enter a Number" class="playeroneinput" id="numberoneinput">
             <button class="pbtnone" id="numberonebtn">Let's Go</button>
             <h3 class="playertextonee" id="numoneerror" hidden>Must Enter A Number!</h3>
            </div>

        </div>



    <!-- ----- -->

        <div class="boxtwobg" id="secondscreen">

          <div class="boxtwo">
             <h2 class="boxtexttwo">Player-2 <br>Enter Your Name</h2>
             <input type="text" placeholder="Enter Your Name" class="boxtwoinput" id="nameinputtwo">
             <button class="btntwo" id="screentwobtn">Start Game</button>
             <h3 class="boxtexttwoo" id="nametwoerror" hidden>Name Is Missing!</h3>
            </div>

        </div>


    <!-- ----- -->

      <div class="playertwobg" id="playertwoscreen">

          <div class="playertwo">
             <h2 class="playertexttwo" id="playernametwo">Player-2</h2>
             <input type="number" placeholder="Guess The Number" class="playertwoinput" id="numbertwoinput">
             <button class="pbtntwo" id="numtwobtn">Guess</button>
             <h3 class="playertexttwoo" id="numtwoerror" hidden>Must Enter A Number!</h3>

            </div>

      </div>
   <!-- ------------------------- -->


        <div class="boxthreebg" id="thirdscreen">

          <div class="boxthree">
             <h2 class="boxtextthree">Player-3 <br>Enter Your Name</h2>
             <input type="text" placeholder="Enter Your Name" class="boxthreeinput" id="nameinputthree">
             <button class="btnthree" id="screenthreebtn">Start Game</button>
             <h3 class="boxtextthreee" id="namethreeerror" hidden>Name Is Missing!</h3>
            </div>

        </div>


    <!-- ----- -->

        <div class="playerthreebg" id="playerthreescreen">

          <div class="playerthree">
             <h2 class="playertextthree" id="playernamethree">Player-3</h2>
             <input type="number" placeholder="Guess The Number" class="playerthreeinput" id="numberthreeinput">
             <button class="pbtnthree" id="numthreebtn">Guess</button>
             <h3 class="playertextthreee" id="numthreeerror" hidden>Must Enter A Number!</h3>
            </div>

        </div>

    <!-- ---------------- -->

        <div class="overbg" id="endscreen">

          <div class="gameover">
            <h2 class="endtext" id="wintext"></h2>
            <h2 class="gotext" id="gameovertext">Game Over</h2>
            </div>

        </div>

  <script src="js/script.js"></script>
</body>
</html>
